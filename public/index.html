<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>진로상담 챗봇</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">진</div>
          <div>
            <strong>진로상담</strong>
            <span>AI 멘토 챗봇</span>
          </div>
        </div>

        <button class="new-chat" id="newChatButton" type="button">
          <span>+</span>
          새 대화
        </button>

        <div class="session-panel">
          <div class="sidebar-label">대화</div>
          <div class="session-list" id="sessionList">
            <div class="session-empty">저장된 대화가 없습니다.</div>
          </div>
        </div>

        <div class="settings">
          <label for="modelSelect">모델</label>
          <select id="modelSelect">
            <option value="">JSON 기본 모델 사용</option>
          </select>

          <label for="temperatureRange"
            >창의성 <span id="temperatureValue">0.7</span></label
          >
          <input
            id="temperatureRange"
            type="range"
            min="0"
            max="1.5"
            step="0.1"
            value="0.7"
          />
        </div>

        <div class="prompt-note">
          챗봇의 역할과 응답 방식은
          <code>prompts/personal-profile.json</code>에서 수정합니다.
        </div>
      </aside>

      <main class="chat">
        <header class="chat-header">
          <div>
            <h1>진로상담 챗봇</h1>
            <p>진로 고민, 직무 탐색, 학습 계획까지 도와주는 AI 멘토입니다.</p>
          </div>
          <div class="status" id="status">Ollama 확인 중</div>
        </header>

        <section class="messages" id="messages" aria-live="polite">
          <div class="empty-state">
            <h2>무엇을 물어볼까요?</h2>
            <div class="suggestions">
              <button
                type="button"
                data-prompt="제가 진로를 아직 정하지 못했는데, 어떤 방향으로 생각하면 좋을까요?"
              >
                진로 방향 고민
              </button>
              <button
                type="button"
                data-prompt="저는 IT 쪽에 관심이 있는데, 어떤 직무가 잘 맞을지 분석해주세요."
              >
                직무 탐색
              </button>
              <button
                type="button"
                data-prompt="제 목표와 성향을 바탕으로 3개월 학습 계획을 짜주세요."
              >
                학습 계획 세우기
              </button>
            </div>
          </div>
        </section>

        <form class="composer" id="chatForm">
          <textarea
            id="promptInput"
            rows="1"
            placeholder="메시지를 입력하세요"
            autocomplete="off"
          ></textarea>
          <button id="sendButton" type="submit" aria-label="전송">
            <span>➜</span>
          </button>
        </form>
      </main>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
